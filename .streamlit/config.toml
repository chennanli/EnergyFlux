# Streamlit theme for the EnergyFlux live demo.
# Palette matches blog 1 on GitHub Pages (primary blue #1F4E79).
# Dark base for continuity with app.py's plotly_dark charts.
[theme]
base              = "dark"
primaryColor      = "#1F4E79"
backgroundColor   = "#0E1117"
secondaryBackgroundColor = "#1a2030"
textColor         = "#E6EAF2"
font              = "sans serif"

[server]
# Cloud sets these; harmless locally.
headless          = true
runOnSave         = true

[browser]
gatherUsageStats  = false
